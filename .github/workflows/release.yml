name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create GitHub Release and upload artifacts

jobs:
  release-win:
    name: Windows (NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Package & publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bun run --cwd desktop build:win

  release-mac:
    name: Mac (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Package & publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Uncomment + add secrets to enable notarization:
          # CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run --cwd desktop build:dmg

  release-linux:
    name: Linux (AppImage + deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Linux packaging deps
        run: sudo apt-get install -y rpm fakeroot

      - name: Build
        run: bun run build

      - name: Package & publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bun run --cwd desktop build:linux
